<g id="row-r2">
<text x="67" y="409" font-family="Arial" font-size="12" fill="#1A1A1A">
<tspan x="67" dy="0">• Основной поток направлен в центральную и восточно-центральную часть города</tspan>
<tspan x="67" dy="18">• Наибольшая нагрузка формируется в районах Кульджинского тракта, Центральной мечети, вокзала Алматы-2</tspan>
<tspan x="67" dy="18">• Формируется выраженный коридор притяжения вдоль Райымбека</tspan>
<tspan x="67" dy="18">• Структура перемещений характеризуется недостаточной распределенностью по территории города</tspan>
<tspan x="67" dy="18">• Наблюдается слабое распределение потоков в южные районы</tspan>
<tspan x="67" dy="18">• формируется избыточная нагрузка на центральные участки улично-дорожной сети и увеличивается время поездок для населения</tspan>
</text>
