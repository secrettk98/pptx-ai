<g id="row_r2">
<g id="col_c3">
<text x="67" y="499" font-size="14" font-weight="bold" fill="#1A1A1A" font-family="sans-serif">Ключевые выводы</text>
<text x="67" y="523" font-size="12" fill="#1A1A1A" font-family="sans-serif">
<tspan x="67" dy="0">• По данным за 11.11.25 общее количество транзакций по всем маршрутам составило 1 509 900, из</tspan>
<tspan x="67" dy="18">которых 58 098 транзакций приходится на 9 пригородных маршрутов Талгарского тракта.</tspan>
<tspan x="67" dy="24">• Анализ показал, что наиболее востребованными являются частично пригородные маршруты 100</tspan>
<tspan x="67" dy="18">(30%), 8 (16%), 54 (16%). Это связано с тем , что данные маршруты проходят через наиболее</tspan>
<tspan x="67" dy="18">густонаселенные пункты Бесагаш с населением 24 127 чел. и Туздыбастау с населением 19 702 чел.</tspan>
<tspan x="67" dy="24">• Среди пригородных маршрутов наиболее востребованные маршруты 252 (14%), 207 (12%), что</tspan>
<tspan x="67" dy="18">связано с их прохождением через город Талгар и город Есик.</tspan>
<tspan x="67" dy="24">• На исследуемых маршрутах преобладают взрослые и студенческие транзакции, что может</tspan>
<tspan x="67" dy="18">свидетельствовать о высоком спросе на передвижения в места работы и учебы.</tspan>
</text>
</g>
