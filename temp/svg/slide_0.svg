<rect x="47" y="446" width="708" height="227" rx="12" ry="12" fill="#F8F9FA" stroke="#E0E0E0" stroke-width="1"/>
<text x="71" y="484" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1A1A1A">Ключевые выводы</text>
<text x="71" y="518" font-family="sans-serif" font-size="12" fill="#1A1A1A">
<tspan x="71" dy="0">• 58 098 транзакций приходится на 9 пригородных маршрутов Талгарского тракта.</tspan>
<tspan x="71" dy="22">• Самые популярные маршруты — 100 (30%), 8 (16%), 54 (16%), проходящие через</tspan>
<tspan x="71" dy="18">густонаселенные Бесагаш и Туздыбастау.</tspan>
<tspan x="71" dy="22">• Среди чисто пригородных лидируют маршруты 252 (14%) и 207 (12%), идущие</tspan>
<tspan x="71" dy="18">в Талгар и Есик.</tspan>
<tspan x="71" dy="22">• Преобладают взрослые и студенческие транзакции, что указывает на поездки на</tspan>
<tspan x="71" dy="18">работу и учёбу.</tspan>
</text>
