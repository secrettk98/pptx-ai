    <tspan x="100" dy="20">Внимательно проверяем не</tspan>
    <tspan x="100" dy="20">только фамилию, но и номер</tspan>
    <tspan x="100" dy="20">рейса/направление на</tspan>
    <tspan x="100" dy="20">посадочном талоне при</tspan>
    <tspan x="100" dy="20">сканировании.</tspan>
  </text>

