  <text x="310" y="65" font-family="Montserrat, sans-serif" font-size="28" font-weight="800" fill="#24325B" letter-spacing="2">ОПЕРАЦИОННАЯ СВОДКА</text>
  
  <!-- Бейдж Май -->
