  <text x="1480" y="356" font-family="Montserrat, sans-serif" font-size="10" font-weight="800" fill="#166534" text-anchor="middle">🟢 0</text>
  <text x="1580" y="348" font-family="Montserrat, sans-serif" font-size="18" font-weight="900" fill="#B12028">15</text>
