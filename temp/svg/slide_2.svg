  <text x="120" y="460" font-family="Montserrat, sans-serif" font-size="13" fill="white" font-weight="500">
    <tspan x="120" dy="0">🌟 Коллеги, 90% — это показатель профессионализма. Мы доказали, что можем работать четко даже при высоких требованиях.</tspan>
    <tspan x="120" dy="22">В мае нагрузка не снизится, но я верю, что мы сохраним этот темп. Берегите себя, помогайте коллегам на сменах.</tspan>
    <tspan x="120" dy="22">Май будет жарким, но мы справимся! ✈️💙</tspan>
  </text>
  <rect x="860" y="440" width="230" height="70" rx="10" fill="#B12028" transform="rotate(-2 860 440)"/>
  <text x="975" y="475" font-family="Montserrat, sans-serif" font-size="16" font-weight="900" fill="white" text-anchor="middle" transform="rotate(-2 860 440)">ПОГНАЛИ В МАЙ!<tspan x="975" dy="20">ТОЛЬКО 90%+! 🔥</tspan></text>

