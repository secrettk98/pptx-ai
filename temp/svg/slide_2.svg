  <circle cx="540" cy="300" r="60" fill="none" stroke="#CBD5E1" stroke-width="12"/>
  <path d="M 540 240 A 60 60 0 1 1 540 360 A 60 60 0 0 1 485 325" fill="none" stroke="#B12028" stroke-width="12" stroke-linecap="round"/>
  <text x="540" y="308" font-family="Montserrat, sans-serif" font-size="22" font-weight="900" fill="#B12028" text-anchor="middle">90%</text>
  <text x="620" y="250" font-family="Montserrat, sans-serif" font-size="14" font-weight="700" fill="#24325B">АПРЕЛЬ (ИТОГ) 🚀</text>
