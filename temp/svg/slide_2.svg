  <text x="460" y="800" font-family="Montserrat, sans-serif" font-size="13" font-weight="800" fill="#166534">РЕШЕНИЕ:</tspan>
  <text x="460" y="825" font-family="Montserrat, sans-serif" font-size="12" fill="#14532D">
