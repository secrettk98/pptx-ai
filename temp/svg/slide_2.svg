  <text x="1410" y="506" font-family="Montserrat, sans-serif" font-size="10" font-weight="800" fill="#166534" text-anchor="middle">🟢 0</text>
  <rect x="1450" y="490" width="60" height="24" rx="5" fill="#DCFCE7"/>
  <text x="1480" y="506" font-family="Montserrat, sans-serif" font-size="10" font-weight="800" fill="#166534" text-anchor="middle">🟢 0</text>
  <text x="1580" y="498" font-family="Montserrat, sans-serif" font-size="18" font-weight="900" fill="#24325B">7</text>
