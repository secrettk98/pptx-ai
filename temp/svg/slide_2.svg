    <tspan x="460" dy="20">открывается только после</tspan>
    <tspan x="460" dy="20">команды наземного персонала.</tspan>
    <tspan x="460" dy="20">Провести беседу с экипажами о</tspan>
    <tspan x="460" dy="20">недопустимости открытия дверей</tspan>
    <tspan x="460" dy="20">до прибытия всех служб.</tspan>
  </text>

  <!-- Репорт 3 -->
  <rect x="780" y="640" width="340" height="400" rx="20" fill="white" stroke="#E2E8F0"/>
  <rect x="780" y="640" width="340" height="8" rx="4" fill="#B12028"/>
  <circle cx="1085" cy="675" r="15" fill="#FEE2E2"/>
  <text x="1085" y="680" font-family="Montserrat, sans-serif" font-size="12" font-weight="900" fill="#B12028" text-anchor="middle">3</text>
  <text x="805" y="685" font-family="Montserrat, sans-serif" font-size="15" font-weight="800" fill="#24325B">Багаж (рейс 7315) 🛑</text>
  <text x="805" y="715" font-family="Montserrat, sans-serif" font-size="12" fill="#475569">
    <tspan x="805" dy="0">Ошибка Рамп-агента в подсчете.</tspan>
    <tspan x="805" dy="20">Благодаря внимательности борт</tspan>
    <tspan x="805" dy="20">был закрыт вовремя.</tspan>
