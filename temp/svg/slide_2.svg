    <tspan x="1220" dy="55">Смена Айданы и Жанны, ваши «нулевые»</tspan>
    <tspan x="1220" dy="35">задержки — это то, на чем держатся</tspan>
    <tspan x="1220" dy="35">наши 90% OTP. Молодцы! 😊</tspan>
