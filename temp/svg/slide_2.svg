  <text x="1800" y="57" font-family="Montserrat, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">МАЙ 2024</text>

  <!-- БЛОК 1: ПУНКТУАЛЬНОСТЬ (OTP) -->
  <text x="60" y="160" font-family="Montserrat, sans-serif" font-size="24" font-weight="800" fill="#24325B">📈 ПУНКТУАЛЬНОСТЬ (OTP)</text>
  <rect x="60" y="180" width="1080" height="380" rx="20" fill="white" stroke="#E2E8F0"/>
  
  <!-- Март -->
  <circle cx="180" cy="300" r="60" fill="none" stroke="#E2E8F0" stroke-width="12"/>
  <path d="M 180 240 A 60 60 0 1 1 125 325" fill="none" stroke="#24325B" stroke-width="12" stroke-linecap="round"/>
  <text x="180" y="308" font-family="Montserrat, sans-serif" font-size="22" font-weight="900" fill="#24325B" text-anchor="middle">81%</text>
  <text x="260" y="290" font-family="Montserrat, sans-serif" font-size="14" font-weight="700" fill="#94A3B8">МАРТ (ИТОГ)</text>
  <text x="260" y="315" font-family="Montserrat, sans-serif" font-size="18" font-weight="800" fill="#16A34A">81.0% ✅</text>

