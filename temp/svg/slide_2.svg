    <tspan x="820" dy="20">Наши супервайзеры в очередной</tspan>
    <tspan x="820" dy="20">раз спасли рейс от задержки.</tspan>
    <tspan x="820" dy="20">Отличная работа!</tspan>
  </text>

  <!-- ОТ МЕНЯ ЛИЧНО -->
  <rect x="1180" y="620" width="680" height="420" rx="20" fill="#B12028"/>
  <path d="M 1220 660 Q 1210 660 1210 675 L 1210 685 Q 1210 700 1225 700" fill="none" stroke="white" stroke-width="4" opacity="0.3"/>
  <text x="1220" y="680" font-family="Montserrat, sans-serif" font-size="24" font-weight="900" fill="#FACC15">📢 ОТ МЕНЯ ЛИЧНО:</text>
  <text x="1220" y="730" font-family="Montserrat, sans-serif" font-size="20" font-weight="600" fill="white">
