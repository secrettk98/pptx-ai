  <text x="85" y="685" font-family="Montserrat, sans-serif" font-size="15" font-weight="800" fill="#24325B">Засадка (рейс 7062)</text>
  <text x="85" y="715" font-family="Montserrat, sans-serif" font-size="12" fill="#475569">
