<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <!-- Фон -->
  <rect width="1280" height="720" fill="#FFFFFF"/>
  
  <!-- Margins (красные линии) -->
  <line x1="43" y1="0" x2="43" y2="720" stroke="#FF0000" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="1237" y1="0" x2="1237" y2="720" stroke="#FF0000" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="0" y1="20" x2="1280" y2="20" stroke="#FF0000" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="0" y1="700" x2="1280" y2="700" stroke="#FF0000" stroke-width="0.5" stroke-dasharray="4,4"/>
  
  <!-- 12 колонок (голубые) -->
  <rect x="43" y="20" width="76" height="680" fill="#DBEAFE" opacity="0.4"/>
  <rect x="145" y="20" width="76" height="680" fill="#DBEAFE" opacity="0.4"/>
  <rect x="247" y="20" width="76" height="680" fill="#DBEAFE" opacity="0.4"/>
  <rect x="349" y="20" width="76" height="680" fill="#DBEAFE" opacity="0.4"/>
  <rect x="451" y="20" width="76" height="680" fill="#DBEAFE" opacity="0.4"/>
  <rect x="553" y="20" width="76" height="680" fill="#DBEAFE" opacity="0.4"/>
  <rect x="655" y="20" width="76" height="680" fill="#DBEAFE" opacity="0.4"/>
  <rect x="757" y="20" width="76" height="680" fill="#DBEAFE" opacity="0.4"/>
  <rect x="859" y="20" width="76" height="680" fill="#DBEAFE" opacity="0.4"/>
  <rect x="961" y="20" width="76" height="680" fill="#DBEAFE" opacity="0.4"/>
  <rect x="1063" y="20" width="76" height="680" fill="#DBEAFE" opacity="0.4"/>
  <rect x="1165" y="20" width="72" height="680" fill="#DBEAFE" opacity="0.4"/>
  
  <!-- Примеры блоков -->
  
  <!-- Full width (12 col) -->
  <rect x="43" y="30" width="1194" height="50" fill="none" stroke="#0066CC" stroke-width="2"/>
  <text x="640" y="60" text-anchor="middle" font-size="14" fill="#0066CC">Header — 12 колонок (1194px)</text>
  
  <!-- 7 col + 5 col -->
  <rect x="43" y="106" width="688" height="250" fill="none" stroke="#28A745" stroke-width="2"/>
  <text x="387" y="240" text-anchor="middle" font-size="14" fill="#28A745">Content — 7 колонок (688px)</text>
  
  <rect x="757" y="106" width="480" height="250" fill="none" stroke="#E53935" stroke-width="2"/>
  <text x="997" y="240" text-anchor="middle" font-size="14" fill="#E53935">Content — 5 колонок (480px)</text>
  
  <!-- 4+4+4 -->
  <rect x="43" y="382" width="382" height="150" fill="none" stroke="#FFC107" stroke-width="2"/>
  <text x="234" y="462" text-anchor="middle" font-size="12" fill="#997404">4 колонки (382px)</text>
  
  <rect x="451" y="382" width="382" height="150" fill="none" stroke="#FFC107" stroke-width="2"/>
  <text x="642" y="462" text-anchor="middle" font-size="12" fill="#997404">4 колонки (382px)</text>
  
  <rect x="859" y="382" width="378" height="150" fill="none" stroke="#FFC107" stroke-width="2"/>
  <text x="1048" y="462" text-anchor="middle" font-size="12" fill="#997404">4 колонки (378px)</text>
  
  <!-- 6+6 -->
  <rect x="43" y="558" width="582" height="120" fill="none" stroke="#8B5CF6" stroke-width="2"/>
  <text x="334" y="623" text-anchor="middle" font-size="12" fill="#8B5CF6">6 колонок (582px)</text>
  
  <rect x="655" y="558" width="582" height="120" fill="none" stroke="#8B5CF6" stroke-width="2"/>
  <text x="946" y="623" text-anchor="middle" font-size="12" fill="#8B5CF6">6 колонок (582px)</text>
  
  <!-- Подписи -->
  <text x="10" y="15" font-size="10" fill="#808080">margin: 43px L/R, 20px T/B | col: 76px | gap: 26px | 12 columns</text>
</svg>
